# ==================== window stuff ====================
window_padding_width 12 10
background_opacity 0.92
dynamic_background_opacity yes
hide_window_decorations yes

# ==================== scrolling ====================
scrollback_lines 5000

# ==================== font ====================
font_family JetBrainsMono Nerd Font
bold_font       JetBrainsMono Nerd Font Bold
italic_font     JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size 12.0
enable_ligatures always

# ==================== colors ====================
background #0f0a06
foreground #e8dcc8

color0  #0d0805
color1  #8b2020
color2  #4a5e3a
color3  #8b6914
color4  #3a4a5e
color5  #6b3a3a
color6  #3a5e4a
color7  #c8b89a

color8  #2a1a0a
color9  #b84040
color10 #6b8a52
color11 #c4982a
color12 #526b8a
color13 #8a5252
color14 #528a6b
color15 #e8dcc8

cursor #e8dcc8
cursor_text_color background

# makes it feel more "alive"
active_border_color #c4982a   # your yellow tone
inactive_border_color #2a1a0a

# if you use wayland (common on modern setups)
linux_display_server wayland

# optional: make opacity adjustable live
# (already included dynamic_background_opacity above)
